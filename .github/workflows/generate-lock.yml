name: Generate Composer Lock File

on:
  push:
    paths:
      - 'composer.json'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring

      - name: Generate Lock File
        run: composer update --ignore-platform-reqs

      - name: Commit and Push Lock File
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: auto-generate valid composer.lock"
          file_pattern: 'composer.lock'
